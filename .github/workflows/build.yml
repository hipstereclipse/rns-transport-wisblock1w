name: Build Firmware & Publish Release

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

permissions:
  contents: write      # needed to create/update releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 deprecation warnings

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python / PlatformIO ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      # Pre-install the nordicnrf52 platform + all project lib deps so the
      # build step never needs to download anything under time pressure.
      - name: Install platform & library packages
        run: pio pkg install -e wisblock_1w_transport

      # ── Build ────────────────────────────────────────────────────────────────
      # Override extra_scripts to empty so the CI build does not try to run
      # generate_uf2.py via SCons (we do that explicitly below instead).
      - name: Build firmware (wisblock_1w_transport)
        run: |
          pio run -e wisblock_1w_transport \
            --project-option "extra_scripts=" \
            -v

      # ── Generate UF2 ────────────────────────────────────────────────────────
      - name: Get short commit SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Convert HEX → UF2
        run: |
          python tools/generate_uf2.py \
            .pio/build/wisblock_1w_transport/firmware.hex \
            rns-transport-wisblock1w-main-${{ steps.sha.outputs.short }}.uf2

      - name: Verify UF2 was created
        run: |
          ls -lh rns-transport-wisblock1w-main-${{ steps.sha.outputs.short }}.uf2
          echo "UF2 artifact ready."

      # ── Publish rolling "latest" release ─────────────────────────────────────
      # Creates (or updates) a release tagged "latest" on every push to main.
      # The web flasher polls /releases and will immediately see the new asset.
      - name: Publish "latest" GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build (main)"
          body: |
            Automatically built from the `main` branch.

            **Commit:** [`${{ steps.sha.outputs.short }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Built:** ${{ github.event.head_commit.timestamp }}

            Flash this firmware using the [web flasher](https://hipstereclipse.github.io/rns-transport-wisblock1w/flasher/).
          artifacts: "rns-transport-wisblock1w-main-${{ steps.sha.outputs.short }}.uf2"
          allowUpdates: true        # overwrite the release on every push
          replacesArtifacts: true   # replace the previous .uf2 asset
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
