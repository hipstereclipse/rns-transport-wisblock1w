; ============================================================================
; RNS Transport Node — WisBlock 1W (RAK3401 + RAK13302)
; PlatformIO Build Configuration
; ============================================================================

[env:wisblock_1w_transport]
platform = nordicnrf52
board = wiscore_rak4631
framework = arduino

monitor_speed = 115200

lib_deps =
    jgromes/RadioLib@^7.1.0
    rweather/Crypto@^0.4.0

build_flags =
    -DRNS_TRANSPORT_NODE=1
    -DRADIOLIB_SX126X=1
    -DCFG_DEBUG=0
    -w
    -std=gnu++17
    -Os

build_unflags =
    -std=gnu++11

; ── Safety: generate UF2 for drag-and-drop flashing ──────
extra_scripts = post:tools/generate_uf2.py

; ── Upload via Adafruit nRF52 bootloader (safe, no JTAG needed) ──
upload_protocol = nrfutil
upload_port = /dev/ttyACM0

; ── Test configuration ────────────────────────────────────
[env:native_test]
platform = native
build_flags =
    -DRNS_TRANSPORT_NODE=1
    -DNATIVE_TEST=1
    -std=gnu++17
test_build_src = yes
lib_deps =
    rweather/Crypto@^0.4.0
